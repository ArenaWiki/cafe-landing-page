<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The cafe has a new home!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #faf4ed;
        --text: #575279;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: var(--bg);
        color: var(--text);
        font-family: "Roboto", system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      main {
        max-width: 700px;
        text-align: center;
      }

      a {
        color: inherit;
      }

      .button {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.8rem 1.2rem;
        border-radius: 0.5rem;
        border: 1px solid var(--text);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>The cafe has a new home!</h1>
      <p>
        Our wiki will now be located at
        <a href="https://cafe.miraheze.org">https://cafe.miraheze.org</a>, instead of
        the domain you are visiting currently. Do update your bookmarks to reflect
        this new change. Learn more about this change
        <a href="https://hybridcafe.wiki/wiki/User:Enews/Retiring_our_domain">here</a>.
      </p>
      <a class="button" href="https://cafe.miraheze.org">Continue Reading</a>
    </main>
  </body>
</html>
